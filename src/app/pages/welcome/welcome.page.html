<ion-content [fullscreen]="true" class="welcome-page">

  <div class="welcome-container">

    <div class="logo-container">

      <img
        src="assets/logo-cloudnotes.png"
        alt="Cloud Notes"
        class="logo">

      <h1>Cloud Notes</h1>

      <p>
        Comparte y encuentra apuntes universitarios de forma rápida y organizada.
      </p>

    </div>

    <div class="actions">

      <ion-button expand="block" class="primary-button">
        Iniciar sesión
      </ion-button>

      <ion-button expand="block"
                  fill="outline"
                  class="secondary-button">
        Crear cuenta
      </ion-button>

    </div>

  </div>

</ion-content>
